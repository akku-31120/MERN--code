<!DOCTYPE html>
<html lang="en">
<head>
    <title>grid in tailwind css</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
     <!-- shortcut key of line no 9 to 26 is div>div.bg-green-400.p-12.border.border-green-800*16{$} -->
    <div class="grid grid-cols-4 gap-2 sm:grid-cols-2 md:grid-cols-4">
        <div class="bg-green-400 p-12 border border-green-800">1</div>
        <div class="bg-green-400 p-12 border border-green-800 col-span-2">2</div>
        <div class="bg-green-400 p-12 border border-green-800">3</div>
        <div class="bg-green-400 p-12 border border-green-800">4</div>
        <div class="bg-green-400 p-12 border border-green-800">5</div>
        <div class="bg-green-400 p-12 border border-green-800">6</div>
        <div class="bg-green-400 p-12 border border-green-800 row-span-3">7</div>
        <div class="bg-green-400 p-12 border border-green-800">8</div>
        <div class="bg-green-400 p-12 border border-green-800">9</div>
        <div class="bg-green-400 p-12 border border-green-800">10</div>
        <div class="bg-green-400 p-12 border border-green-800">11</div>
        <div class="bg-green-400 p-12 border border-green-800">12</div>
        <div class="bg-green-400 p-12 border border-green-800">13</div>
        <div class="bg-green-400 p-12 border border-green-800">14</div>
        <div class="bg-green-400 p-12 border border-green-800">15</div>
        <div class="bg-green-400 p-12 border border-green-800">16</div>
    </div>
</body>
</html>
