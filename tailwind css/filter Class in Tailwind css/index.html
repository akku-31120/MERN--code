<!DOCTYPE html>
<html lang="en">
<head>  
    <title>Filter Class in Tailwind CSSt</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <h1>Original image</h1>
    <img src="./monkey.jpg.jpg" alt="">

    <!-- blurred effect on image -->
    <h1>blurred image</h1>
    <img  class="blur" src="./monkey.jpg.jpg" alt="">
    <img  class="blur-sm"src="./monkey.jpg.jpg" alt="">
    <img  class="blur-md"src="./monkey.jpg.jpg" alt="">
    <img  class="blur-lg"src="./monkey.jpg.jpg" alt="">
    <img  class="blur-xl"src="./monkey.jpg.jpg" alt="">

    <!-- brightness on image -->
    <h1>Brightness</h1>
    <img class="brightness-50" src="./monkey.jpg.jpg" alt="">
    <img class="brightness-100" src="./monkey.jpg.jpg" alt="">
    <img class="brightness-150" src="./monkey.jpg.jpg" alt="">
    <img class="brightness-200" src="./monkey.jpg.jpg" alt="">
    <img class="brightness-250" src="./monkey.jpg.jpg" alt="">
    <img class="brightness-350" src="./monkey.jpg.jpg" alt="">

    <h1>Contrast</h1>
    <img class="contrast-0" src="./monkey.jpg.jpg" alt="">
    <img class="contrast-50" src="./monkey.jpg.jpg" alt="">
    <img class="contrast-100" src="./monkey.jpg.jpg" alt="">
    <img class="contrast-150" src="./monkey.jpg.jpg" alt="">

    <!-- black and white color on image so use grayscale -->
    <h1>gray scale</h1>
    <img class="grayscale" src="./monkey.jpg.jpg" alt="">
    <img class="grayscale-25" src="./monkey.jpg.jpg" alt="">
    <img class="grayscale-50" src="./monkey.jpg.jpg" alt="">
    <img class="grayscale-75" src="./monkey.jpg.jpg" alt="">
    <img class="grayscale-100" src="./monkey.jpg.jpg" alt="">

    <h1>Invert:</h1>
    <img class="invert" src="./monkey.jpg.jpg" alt="">

    <h1>Hue:</h1>
    <img class="hue-rotate-15" src="./monkey.jpg.jpg" alt="">
    <img class="hue-rotate-30" src="./monkey.jpg.jpg" alt="">
    <img class="hue-rotate-60" src="./monkey.jpg.jpg" alt="">
    <img class="hue-rotate-70" src="./monkey.jpg.jpg" alt="">

    <!-- blur effect on text -->
       <h1 class="blur-sm">Lorem ipsum dolor, sit amet consectetur adipisicing elit.</h1>

</body>
</html>
