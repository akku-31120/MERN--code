<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation class in css</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <div class="size-25 bg-yellow-400 p-4 mt-10 ml-10 animate-bounce rounded-full"></div>
    <hr />
    <div class="h-2 w-34 bg-yellow-500 mt-40 ml-25 animate-spin"></div>
    <hr />
    <div class="size-20 bg-amber-500 animate-ping m-35"></div>
    <div class="size-20 bg-amber-500 animate-ping m-35 rounded-full"></div>
    <div class="size-20 bg-amber-500 animate-pulse m-35"></div>
    <div class="size-20 bg-amber-500 animate-pulse m-35 rounded-full"></div>
</body>
</html>
