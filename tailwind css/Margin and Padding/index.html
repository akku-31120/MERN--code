<!DOCTYPE html>
<html lang="en">
<head>
    <title>Margin and Padding in tailwind css</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>

  <span class="bg-amber-200 ml-10 pl-10 mt-10 pt-10 block">Lorem ipsum dolor sit amet consectetur adipisicing.</span>
<h1 class="bg-yellow-900 p-[100px] text-white m-[50px]">Margin and Padding in tailwind css</h1>   

 <h1 class="bg-yellow-400 p-15 m-5">Margin and Padding in tailwind css</h1>   
  <h1 class="bg-yellow-300 px-24 mx-40">Margin and Padding in tailwind css</h1>   
    <h1 class="bg-yellow-200 py-24 my-40">Margin and Padding in tailwind css</h1>
    <!-- if we want to apply padding and margin in one specific direction not in four or two direction. then -->
  <h1 class="bg-yellow-100 pt-16 mt-16">Margin and Padding in tailwind css</h1>

  <!-- here pt means padding on top and mt means margin on top
  similarly,pl means padding on left and ml means margin on left.
            pr means padding on right and mr means margin on right.
            pb  means padding on bottom and mb means margin on bottom -->

            <h1 class="bg-yellow-700 pr-18 mr-16 text-right">Margin and Padding in tailwind css</h1>



</body>
</html>
<!-- px denote padding in horizontal direction  and mx denote margin in horizontal direction( alongx-axis)
     py denote padding in vertical direction and my denote margin in vertical direction
-->
